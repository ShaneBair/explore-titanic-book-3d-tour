<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Explore Titanic: 3D Tour</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
</head>
<body>

<div id="controls">
    <button id="toggleMap">Toggle Map</button>
</div>

<div id="panorama"></div>

<div id="mapOverlay">
    <img id="mapImage" src="./images/Map_v2.png" alt="Titanic Map">
    <!-- Points from titanic24.xml mapper data, positioned by x,y -->
    <div class="mapPoint" style="left: 641px; top: 116px;" onclick="loadScene('base2')" title="base2"></div>
    <div class="mapPoint" style="left: 641px; top: 212px;" onclick="loadScene('boiler')" title="boiler"></div>
    <div class="mapPoint" style="left: 769px; top: 110px;" onclick="loadScene('bridge_throttle')" title="bridge_throttle"></div>
    <div class="mapPoint" style="left: 545px; top: 171px;" onclick="loadScene('dining')" title="dining"></div>
    <div class="mapPoint" style="left: 580px; top: 126px;" onclick="loadScene('Topdeck_view2')" title="Topdeck_view2"></div>
    <div class="mapPoint" style="left: 689px; top: 189px;" onclick="loadScene('Swimming_pool_view1_cube')" title="Swimming_pool_view1_cube"></div>
    <div class="mapPoint" style="left: 451px; top: 143px;" onclick="loadScene('deck2')" title="deck2"></div>
    <div class="mapPoint" style="left: 298px; top: 119px;" onclick="loadScene('Topdeck_view3')" title="Topdeck_view3"></div>
    <div class="mapPoint" style="left: 103px; top: 127px;" onclick="loadScene('Topdeck_view4')" title="Topdeck_view4"></div>
    <div class="mapPoint" style="left: 713px; top: 137px;" onclick="loadScene('deck1')" title="deck1"></div>
    <div class="mapPoint" style="left: 844px; top: 88px;" onclick="loadScene('Topdeck_view1')" title="Topdeck_view1"></div>
    <div class="mapPoint" style="left: 248px; top: 141px;" onclick="loadScene('deck3')" title="deck3"></div>
    <!-- Add more points as needed from XML -->
</div>

<script src="script.js"></script>

</body>
</html>
