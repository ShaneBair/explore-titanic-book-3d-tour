<!DOCTYPE html>
<html>
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-81ZEHL8SZ5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-81ZEHL8SZ5');
    </script>
    <meta charset="utf-8">
    <title>Explore Titanic: 3D Tour</title>
    <link rel="icon" href="./fav.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
</head>
<body>

<div id="controls">
    <button id="toggleMap"></button>
</div>

<div id="panorama"></div>

<div id="mapOverlay">
    <img id="mapImage" src="./images/Map_v2.png" alt="Titanic Map">
    <select id="hiddenScenesSelect">
        <option value="">Select a hidden scene</option>
        <option value="afthelm">Aft Helm</option>
        <option value="forwardhelm">Forward Helm</option>
        <option value="base">Grand Stair Case: Base</option>
        <option value="lower_left_cube">Grand Stair Case: Lower Left</option>
        <option value="lower_right_cube">Grand Stair Case: Lower Right</option>
        <option value="stairs_midlevel">Grand Stair Case: Midlevel</option>
        <option value="Swimming_pool_view2">Swimming pool view2</option>
        <option value="topstair_center_cube">Grand Stair Case: Top Center</option>
        <option value="topstair_left_cube">Grand Stair Case: Top Left</option>
        <option value="topstairright_cube">Grand Stair Case: Top Right</option>
    </select>
    <!-- Points from titanic24.xml mapper data, positioned by x,y -->
    <div class="mapPoint" data-x="641" data-y="116" onclick="loadScene('base2')" title="Grand Stair Case: Base"></div>
    <div class="mapPoint" data-x="641" data-y="212" onclick="loadScene('boiler')" title="Boiler Room"></div>
    <div class="mapPoint" data-x="769" data-y="110" onclick="loadScene('bridge_throttle')" title="Bridge Throttle"></div>
    <div class="mapPoint" data-x="545" data-y="171" onclick="loadScene('dining')" title="Dining Saloon"></div>
    <div class="mapPoint" data-x="580" data-y="126" onclick="loadScene('Topdeck_view2')" title="Topdeck View 2"></div>
    <div class="mapPoint" data-x="689" data-y="189" onclick="loadScene('Swimming_pool_view1_cube')" title="Swimming Pool View 1"></div>
    <div class="mapPoint" data-x="451" data-y="143" onclick="loadScene('deck2')" title="Deck 2"></div>
    <div class="mapPoint" data-x="298" data-y="119" onclick="loadScene('Topdeck_view3')" title="Topdeck View 3"></div>
    <div class="mapPoint" data-x="103" data-y="127" onclick="loadScene('Topdeck_view4')" title="Topdeck View 4"></div>
    <div class="mapPoint" data-x="713" data-y="137" onclick="loadScene('deck1')" title="Deck 1"></div>
    <div class="mapPoint" data-x="844" data-y="88" onclick="loadScene('Topdeck_view1')" title="Topdeck View 1"></div>
    <div class="mapPoint" data-x="248" data-y="141" onclick="loadScene('deck3')" title="Deck 3"></div>
    <!-- Add more points as needed from XML -->
</div>

<button id="infoButton">ℹ</button>

<div id="infoModal">
    <div id="infoModalContent">
        <span id="infoModalClose">&times;</span>
        <p>Andrew Bair's family recreated this Titanic tour from the Explore Titanic book for all of you who still want to learn and see more!</p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
